version: "3.8"

services:
  ytb-dl:
    image: ghcr.io/zipenok/ytb-dl:latest
    container_name: ytb-dl
    pull_policy: always
    restart: unless-stopped
    ports:
      - "9832:9832"
    environment:
      TZ: Asia/Shanghai
      PYTHONPATH: /app/config/python-packages:/app
      PYTHONUNBUFFERED: "1"
      YTDLP_UPDATE_DIR: /app/config/python-packages
      HOST_DOWNLOAD_PATH: /volume1/Nas/downloads/youtube
      WEB_AUTH_USERNAME: admin
      WEB_AUTH_PASSWORD: change-this-password
      API_TOKEN: change-this-api-token
      AUTH_SECRET: change-this-session-secret
      PATH: /app/config/bin:/opt/venv/bin:/usr/local/bin:/usr/bin:/bin
    volumes:
      - /volume1/Nas/downloads/youtube:/app/downloads
      - /volume1/docker/ytb-dl/config:/app/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --tries=1 --timeout=10 http://localhost:9832/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Optional Intel Quick Sync / VA-API acceleration.
    # Enable only if your Synology has /dev/dri and you want hardware transcoding.
    # devices:
    #   - /dev/dri:/dev/dri
