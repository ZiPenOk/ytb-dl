name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changelog
        id: changelog
        shell: bash
        run: |
          PREV_TAG="$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || true)"
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          {
            echo "## Changes"
            echo
            git log "$RANGE" --pretty=format:"- %s" || true
            echo
            echo
            echo "## Docker Image"
            echo
            echo "- \`ghcr.io/zipenok/ytb-dl:${GITHUB_REF_NAME}\`"
            echo "- \`ghcr.io/zipenok/ytb-dl:latest\`"
            echo
            echo "## Quick Start"
            echo
            echo "\`\`\`bash"
            echo "docker pull ghcr.io/zipenok/ytb-dl:${GITHUB_REF_NAME}"
            echo "docker compose up -d"
            echo "\`\`\`"
          } > CHANGELOG.md

          {
            echo "body<<EOF"
            cat CHANGELOG.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
